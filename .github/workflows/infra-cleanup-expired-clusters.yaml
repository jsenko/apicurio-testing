name: "[Infra] Cleanup expired clusters"
run-name: "[Infra] Cleanup expired clusters"
on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:
    inputs:
      dry-run:
        type: boolean
        description: Only report expired clusters without destroying them.
        default: false
        required: false

concurrency:
  group: infra-cleanup-expired-clusters
  cancel-in-progress: true

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_DEFAULT_REGION: "us-east-1"
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  OPENSHIFT_PULL_SECRET: ${{ secrets.OPENSHIFT_PULL_SECRET }}
  SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}

jobs:

  cleanup:
    name: Cleanup expired clusters
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:

      - name: Checkout ${{ github.ref }}
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Load test cache
        run: |
          ./load-cache.sh --token "${{ secrets.ACCESS_TOKEN }}"

      - name: Find and destroy expired clusters
        id: cleanup
        run: |
          NOW_EPOCH=$(date +%s)
          DESTROYED_CLUSTERS=""
          EXPIRING_CLUSTERS=""
          DRY_RUN="${{ inputs.dry-run || 'false' }}"

          echo "Current time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          for EXPIRATION_FILE in cache/clusters/*/expiration; do
            if [[ ! -f "$EXPIRATION_FILE" ]]; then
              continue
            fi

            CLUSTER_DIR=$(dirname "$EXPIRATION_FILE")
            CLUSTER_NAME=$(basename "$CLUSTER_DIR")
            EXPIRATION_ISO=$(cat "$EXPIRATION_FILE")

            # Read who created the cluster
            CREATED_BY=""
            if [[ -f "$CLUSTER_DIR/created-by" ]]; then
              CREATED_BY=$(cat "$CLUSTER_DIR/created-by")
            fi

            # Convert ISO 8601 timestamp to epoch for comparison
            EXPIRATION_EPOCH=$(date -u -d "$EXPIRATION_ISO" +%s 2>/dev/null)
            if [[ -z "$EXPIRATION_EPOCH" ]]; then
              echo "⚠️  Skipping cluster '$CLUSTER_NAME': invalid expiration timestamp '$EXPIRATION_ISO'."
              continue
            fi

            if [[ "$NOW_EPOCH" -ge "$EXPIRATION_EPOCH" ]]; then
              echo "🗑️  Cluster '$CLUSTER_NAME' has expired (expired at $EXPIRATION_ISO, created by ${CREATED_BY:-unknown})."

              if [[ "$DRY_RUN" == "true" ]]; then
                echo "  ⏭️  Dry run: skipping destruction."
                DESTROYED_CLUSTERS="${DESTROYED_CLUSTERS}${CLUSTER_NAME}:${CREATED_BY:-unknown},"
              else
                echo "  Destroying cluster '$CLUSTER_NAME'..."
                if ./destroy-cluster.sh --cluster "$CLUSTER_NAME"; then
                  echo "  ✅ Cluster '$CLUSTER_NAME' destroyed successfully."
                  DESTROYED_CLUSTERS="${DESTROYED_CLUSTERS}${CLUSTER_NAME}:${CREATED_BY:-unknown},"
                else
                  echo "  ❌ Failed to destroy cluster '$CLUSTER_NAME'."
                fi
              fi
            else
              REMAINING=$((EXPIRATION_EPOCH - NOW_EPOCH))
              REMAINING_H=$((REMAINING / 3600))
              echo "⏳ Cluster '$CLUSTER_NAME' expires at $EXPIRATION_ISO (~${REMAINING_H}h remaining, created by ${CREATED_BY:-unknown})."

              # Check if cluster is expiring soon (less than 20% of total time remaining)
              if [[ -f "$CLUSTER_DIR/created-at" ]] && [[ "$DRY_RUN" == "true" || ! -f "$CLUSTER_DIR/expiration-warned" ]]; then
                CREATED_AT_ISO=$(cat "$CLUSTER_DIR/created-at")
                CREATED_AT_EPOCH=$(date -u -d "$CREATED_AT_ISO" +%s 2>/dev/null)
                if [[ -n "$CREATED_AT_EPOCH" ]]; then
                  TOTAL_DURATION=$((EXPIRATION_EPOCH - CREATED_AT_EPOCH))
                  # 20% threshold (integer math, rounded down)
                  THRESHOLD=$((TOTAL_DURATION / 5))
                  if [[ "$REMAINING" -le "$THRESHOLD" ]]; then
                    echo "  ⚠️  Less than 20% time remaining! Marking for notification."
                    if [[ "$DRY_RUN" != "true" ]]; then
                      touch "$CLUSTER_DIR/expiration-warned"
                    fi
                    EXPIRING_CLUSTERS="${EXPIRING_CLUSTERS}${CLUSTER_NAME}:${CREATED_BY:-unknown}:${REMAINING_H},"
                  fi
                fi
              fi
            fi
          done

          echo "destroyed-clusters=$DESTROYED_CLUSTERS" >> $GITHUB_OUTPUT
          echo "expiring-clusters=$EXPIRING_CLUSTERS" >> $GITHUB_OUTPUT

      - name: Save cluster state
        if: always()
        uses: ./.github/actions/save-cluster-state

      - name: Send Slack notification
        if: ${{ steps.cleanup.outputs.destroyed-clusters != '' || steps.cleanup.outputs.expiring-clusters != '' }}
        run: |
          DESTROYED="${{ steps.cleanup.outputs.destroyed-clusters }}"
          EXPIRING="${{ steps.cleanup.outputs.expiring-clusters }}"
          DRY_RUN="${{ inputs.dry-run || 'false' }}"
          WEBHOOK_DESTROYED="${{ secrets.SLACK_GENERAL_NOTIFICATION_WEBHOOK }}"
          WEBHOOK_EXPIRING="${{ secrets.SLACK_IMPORTANT_NOTIFICATION_WEBHOOK }}"

          SLACK_USERS_FILE="slack-users.json"
          LINK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Helper: resolve GitHub user to Slack mention
          UNRESOLVED_USERS=""
          resolve_mention() {
            local GITHUB_USER="$1"
            local SLACK_ID=""
            if [[ -f "$SLACK_USERS_FILE" ]]; then
              SLACK_ID=$(jq -r --arg user "$GITHUB_USER" '.[$user] // ""' "$SLACK_USERS_FILE")
            fi
            if [[ -n "$SLACK_ID" ]]; then
              echo "<@${SLACK_ID}>"
            else
              if [[ "$GITHUB_USER" != "apicurio-ci" ]]; then
                UNRESOLVED_USERS="true"
              fi
              echo "$GITHUB_USER"
            fi
          }

          NL=$'\n'
          SLACK_USERS_LINK="https://github.com/${{ github.repository }}/blob/main/${SLACK_USERS_FILE}"

          # Send a Slack message to the given webhook
          send_slack() {
            local WEBHOOK="$1"
            local MESSAGE="$2"
            if [[ -z "$WEBHOOK" ]]; then
              echo "⚠️  Webhook not set. Skipping notification."
              return
            fi
            local PAYLOAD
            PAYLOAD=$(jq -n --arg text "$MESSAGE" '{text: $text}')
            curl -s -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK"
          }

          # Expiring soon warnings → important webhook
          if [[ -n "$EXPIRING" ]]; then
            MESSAGE="Cluster Cleanup Report${NL}"
            IFS=',' read -ra PAIRS <<< "$EXPIRING"
            for PAIR in "${PAIRS[@]}"; do
              if [[ -z "$PAIR" ]]; then
                continue
              fi
              CLUSTER_NAME=$(echo "$PAIR" | cut -d: -f1)
              GITHUB_USER=$(echo "$PAIR" | cut -d: -f2)
              REMAINING_H=$(echo "$PAIR" | cut -d: -f3)
              USER_MENTION=$(resolve_mention "$GITHUB_USER")
              MESSAGE="${MESSAGE}${NL}Cluster '${CLUSTER_NAME}' (created by ${USER_MENTION}) expires in ~${REMAINING_H}h"
              if [[ "$DRY_RUN" == "true" ]]; then
                MESSAGE="${MESSAGE} (dry run)"
              fi
            done
            if [[ -n "$UNRESOLVED_USERS" ]]; then
              MESSAGE="${MESSAGE}${NL}${NL}To get mentioned, add your GitHub-to-Slack mapping in ${SLACK_USERS_LINK}"
            fi
            MESSAGE="${MESSAGE}${NL}${NL}${LINK}"
            send_slack "$WEBHOOK_EXPIRING" "$MESSAGE"
          fi

          # Destroyed clusters → regular webhook
          UNRESOLVED_USERS=""
          if [[ -n "$DESTROYED" ]]; then
            MESSAGE="Cluster Cleanup Report${NL}"
            IFS=',' read -ra PAIRS <<< "$DESTROYED"
            for PAIR in "${PAIRS[@]}"; do
              if [[ -z "$PAIR" ]]; then
                continue
              fi
              CLUSTER_NAME="${PAIR%%:*}"
              GITHUB_USER="${PAIR#*:}"
              USER_MENTION=$(resolve_mention "$GITHUB_USER")
              if [[ "$DRY_RUN" == "true" ]]; then
                MESSAGE="${MESSAGE}${NL}Cluster '${CLUSTER_NAME}' (created by ${USER_MENTION}) has expired (dry run, not destroyed)"
              else
                MESSAGE="${MESSAGE}${NL}Cluster '${CLUSTER_NAME}' (created by ${USER_MENTION}) has been destroyed (expired)"
              fi
            done
            if [[ -n "$UNRESOLVED_USERS" ]]; then
              MESSAGE="${MESSAGE}${NL}${NL}To get mentioned, add your GitHub-to-Slack mapping in ${SLACK_USERS_LINK}"
            fi
            MESSAGE="${MESSAGE}${NL}${NL}${LINK}"
            send_slack "$WEBHOOK_DESTROYED" "$MESSAGE"
          fi
